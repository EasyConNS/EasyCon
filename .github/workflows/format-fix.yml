name: Auto Fix Format

on:
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**/*.md'
      - 'LICENSE'
      - 'README*'
      - 'CHANGELOG*'

concurrency:
  group: format-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-fix:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 自动修复代码格式
        run: dotnet format --verbosity diagnostic

      - name: 检查格式变更
        id: verify-changed-files
        run: |
          $changed = git diff --exit-code
          if (-not $?) {
            echo "changed=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "changed=false" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: 提交并推送格式修复
        if: steps.verify-changed-files.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: auto-fix dotnet format [skip ci]"
          git push
